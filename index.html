<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Bet - Official</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <video id="splash-video" autoplay muted playsinline preload="auto">
            <source src="https://drive.google.com/uc?export=view&id=1XGfIou4e0KqH5o3_DOFRayjk-MNz09-F" type="video/mp4">
        </video>
    </div>

    <!-- Main Dashboard -->
    <div id="main-app">
        <div class="header">
            <h2>King Bet</h2>
            <div class="diamond-balance">Balance: 0 Diamonds</div>
        </div>

        <div class="game-grid">
            <div class="game-card">Aviator <br><button class="btn-bet">Play</button></div>
            <div class="game-card">JetX <br><button class="btn-bet">Play</button></div>
            <div class="game-card">7 Up Down <br><button class="btn-bet">Play</button></div>
            <div class="game-card">Lucky Spin <br><button class="btn-bet">Play</button></div>
        </div>

        <div style="margin-top: 30px; text-align: center; border-top: 1px solid #333; padding-top: 10px;">
            <h3>Deposit / Withdraw</h3>
            <p style="font-size: 14px; color: #ccc;">
                BOC Bank: 0070563857<br>
                Branch: Dehiowita<br>
                Name: Supun Nirmal Weerasingha
            </p>
        </div>
    </div>

    <script>
        const video = document.getElementById('splash-video');
        video.onended = function() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        };
    </script>
</body>
</html>
